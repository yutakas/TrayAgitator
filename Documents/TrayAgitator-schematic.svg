<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1060" viewBox="0 0 1400 1060" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .ic    { fill:#fbfbfd; stroke:#222; stroke-width:2; }
      .icttl { font-size:15px; font-weight:bold; fill:#111; }
      .pin   { font-family:Menlo,Consolas,monospace; font-size:12px; fill:#222; }
      .net   { font-family:Menlo,Consolas,monospace; font-size:11.5px; fill:#1d4ed8; }
      .wire  { stroke:#333; stroke-width:1.8; fill:none; }
      .ref   { font-size:12px; font-weight:bold; fill:#7c3aed; }
      .note  { font-size:12.5px; fill:#222; }
    </style>
    <!-- ground: connection at (0,0), draws downward -->
    <g id="gnd">
      <line x1="0" y1="0" x2="0" y2="9" class="wire"/>
      <line x1="-10" y1="9" x2="10" y2="9" class="wire"/>
      <line x1="-6" y1="13" x2="6" y2="13" class="wire"/>
      <line x1="-3" y1="17" x2="3" y2="17" class="wire"/>
    </g>
    <!-- vcc bar: connection at (0,0), draws upward -->
    <g id="vcc">
      <line x1="0" y1="0" x2="0" y2="-11" class="wire"/>
      <line x1="-9" y1="-11" x2="9" y2="-11" class="wire"/>
    </g>
    <!-- momentary NO pushbutton, terminals at (-24,0) and (24,0) -->
    <g id="sw">
      <line x1="-24" y1="0" x2="-9" y2="0" class="wire"/>
      <line x1="9" y1="0" x2="24" y2="0" class="wire"/>
      <line x1="-9" y1="0" x2="-9" y2="-6" class="wire"/>
      <line x1="9" y1="0" x2="9" y2="-6" class="wire"/>
      <line x1="-12" y1="-9" x2="12" y2="-9" class="wire"/>
      <line x1="0" y1="-9" x2="0" y2="-17" class="wire"/>
      <line x1="-7" y1="-17" x2="7" y2="-17" class="wire"/>
    </g>
    <!-- polarized cap, top conn (0,-14), bottom conn (0,14) -->
    <g id="capP">
      <line x1="0" y1="-14" x2="0" y2="-4" class="wire"/>
      <line x1="-11" y1="-4" x2="11" y2="-4" class="wire"/>
      <path d="M-11,4 Q0,12 11,4" class="wire"/>
      <line x1="0" y1="8" x2="0" y2="14" class="wire"/>
      <text x="-17" y="-3" class="pin" font-weight="bold">+</text>
    </g>
  </defs>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="26" font-weight="bold" fill="#111">TrayAgitator — Schematic</text>
  <text x="700" y="62" text-anchor="middle" font-size="13.5" fill="#555">ESP32-S3 Zero · A4988 · SSD1306 OLED · buzzer · 4 buttons   ·   nets with the same name are connected</text>

  <!-- ============================= U1 ESP32-S3 Zero ============================= -->
  <rect class="ic" x="520" y="300" width="200" height="360" rx="6"/>
  <text class="icttl" x="620" y="292" text-anchor="middle">U1  ESP32-S3 Zero</text>
  <!-- left pins -->
  <line class="wire" x1="520" y1="332" x2="500" y2="332"/><text class="pin" x="526" y="336">3V3</text>
  <line class="wire" x1="520" y1="360" x2="500" y2="360"/><text class="pin" x="526" y="364">5V</text>
  <line class="wire" x1="520" y1="388" x2="500" y2="388"/><text class="pin" x="526" y="392">GND</text>
  <line class="wire" x1="520" y1="432" x2="500" y2="432"/><text class="pin" x="526" y="436">GPIO3</text>
  <line class="wire" x1="520" y1="470" x2="500" y2="470"/><text class="pin" x="526" y="474">GPIO4</text>
  <line class="wire" x1="520" y1="508" x2="500" y2="508"/><text class="pin" x="526" y="512">GPIO5</text>
  <line class="wire" x1="520" y1="546" x2="500" y2="546"/><text class="pin" x="526" y="550">GPIO6</text>
  <line class="wire" x1="520" y1="600" x2="500" y2="600"/><text class="pin" x="526" y="604">GPIO7</text>
  <!-- right pins -->
  <line class="wire" x1="720" y1="352" x2="740" y2="352"/><text class="pin" x="714" y="356" text-anchor="end">GPIO8</text>
  <line class="wire" x1="720" y1="392" x2="740" y2="392"/><text class="pin" x="714" y="396" text-anchor="end">GPIO9</text>
  <line class="wire" x1="720" y1="470" x2="740" y2="470"/><text class="pin" x="714" y="474" text-anchor="end">GPIO10</text>
  <line class="wire" x1="720" y1="508" x2="740" y2="508"/><text class="pin" x="714" y="512" text-anchor="end">GPIO11</text>
  <line class="wire" x1="720" y1="548" x2="740" y2="548"/><text class="pin" x="714" y="552" text-anchor="end">GPIO12</text>
  <line class="wire" x1="720" y1="620" x2="740" y2="620"/><text class="pin" x="714" y="624" text-anchor="end">GND</text>

  <!-- power symbols on U1 -->
  <use href="#vcc" x="500" y="332"/><text class="net" x="500" y="312" text-anchor="middle">+3V3</text>
  <use href="#vcc" x="500" y="360"/><text class="net" x="466" y="350">+5V (USB-C)</text>
  <use href="#gnd" x="500" y="388"/>
  <use href="#gnd" x="740" y="620"/>

  <!-- ============================= Buttons SW1-4 ============================= -->
  <!-- common ground rail on far left -->
  <line class="wire" x1="320" y1="432" x2="320" y2="560"/>
  <use href="#gnd" x="320" y="560"/>
  <circle cx="320" cy="432" r="3" fill="#333"/><circle cx="320" cy="470" r="3" fill="#333"/>
  <circle cx="320" cy="508" r="3" fill="#333"/><circle cx="320" cy="546" r="3" fill="#333"/>

  <!-- SW1 UP -> GPIO3 -->
  <use href="#sw" x="380" y="432"/><text class="ref" x="380" y="408" text-anchor="middle">SW1 UP</text>
  <line class="wire" x1="404" y1="432" x2="500" y2="432"/>
  <line class="wire" x1="356" y1="432" x2="320" y2="432"/>
  <!-- SW2 DOWN -> GPIO4 -->
  <use href="#sw" x="380" y="470"/><text class="ref" x="436" y="466">SW2 DOWN</text>
  <line class="wire" x1="404" y1="470" x2="500" y2="470"/>
  <line class="wire" x1="356" y1="470" x2="320" y2="470"/>
  <!-- SW3 MODE -> GPIO5 -->
  <use href="#sw" x="380" y="508"/><text class="ref" x="436" y="504">SW3 MODE</text>
  <line class="wire" x1="404" y1="508" x2="500" y2="508"/>
  <line class="wire" x1="356" y1="508" x2="320" y2="508"/>
  <!-- SW4 START -> GPIO6 -->
  <use href="#sw" x="380" y="546"/><text class="ref" x="436" y="542">SW4 START</text>
  <line class="wire" x1="404" y1="546" x2="500" y2="546"/>
  <line class="wire" x1="356" y1="546" x2="320" y2="546"/>
  <text class="note" x="300" y="600" fill="#555">internal INPUT_PULLUP</text>

  <!-- ============================= BZ1 buzzer -> GPIO7 ============================= -->
  <circle cx="430" cy="600" r="18" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="430" y="605" text-anchor="middle" font-size="13" font-weight="bold">BZ</text>
  <text class="ref" x="430" y="568" text-anchor="middle">BZ1 piezo</text>
  <line class="wire" x1="448" y1="600" x2="500" y2="600"/>
  <line class="wire" x1="430" y1="618" x2="430" y2="645"/>
  <use href="#gnd" x="430" y="645"/>

  <!-- ============================= U3 OLED ============================= -->
  <rect class="ic" x="900" y="300" width="180" height="140" rx="6"/>
  <text class="icttl" x="990" y="292" text-anchor="middle">U3  SSD1306 OLED</text>
  <text class="pin" x="990" y="420" text-anchor="middle" fill="#777">I²C 128×64 @ 0x3C</text>
  <line class="wire" x1="900" y1="330" x2="880" y2="330"/><text class="pin" x="906" y="334">VCC</text>
  <line class="wire" x1="900" y1="362" x2="880" y2="362"/><text class="pin" x="906" y="366">GND</text>
  <line class="wire" x1="900" y1="394" x2="880" y2="394"/><text class="pin" x="906" y="398">SDA</text>
  <line class="wire" x1="900" y1="426" x2="880" y2="426"/><text class="pin" x="906" y="430">SCL</text>
  <use href="#vcc" x="855" y="330"/><text class="net" x="855" y="312" text-anchor="middle">+3V3</text>
  <use href="#gnd" x="855" y="362"/>
  <!-- I2C wires to U1 -->
  <path class="wire" d="M740,352 L810,352 L810,394 L880,394"/><text class="net" x="816" y="388">SDA</text>
  <path class="wire" d="M740,392 L800,392 L800,426 L880,426"/><text class="net" x="806" y="446">SCL</text>

  <!-- ============================= U2 A4988 ============================= -->
  <rect class="ic" x="900" y="500" width="200" height="300" rx="6"/>
  <text class="icttl" x="1000" y="492" text-anchor="middle">U2  A4988</text>
  <!-- left pins -->
  <line class="wire" x1="900" y1="525" x2="880" y2="525"/><text class="pin" x="906" y="529">VDD</text>
  <line class="wire" x1="900" y1="556" x2="880" y2="556"/><text class="pin" x="906" y="560">EN</text>
  <line class="wire" x1="900" y1="586" x2="880" y2="586"/><text class="pin" x="906" y="590">STEP</text>
  <line class="wire" x1="900" y1="616" x2="880" y2="616"/><text class="pin" x="906" y="620">DIR</text>
  <line class="wire" x1="900" y1="652" x2="880" y2="652"/><text class="pin" x="906" y="656">SLP</text>
  <line class="wire" x1="900" y1="682" x2="880" y2="682"/><text class="pin" x="906" y="686">RST</text>
  <line class="wire" x1="900" y1="716" x2="868" y2="716"/><text class="pin" x="906" y="720">MS1</text>
  <line class="wire" x1="900" y1="742" x2="868" y2="742"/><text class="pin" x="906" y="746">MS2</text>
  <line class="wire" x1="900" y1="768" x2="868" y2="768"/><text class="pin" x="906" y="772">MS3</text>
  <line class="wire" x1="900" y1="792" x2="880" y2="792"/><text class="pin" x="906" y="796">GND</text>
  <!-- right pins -->
  <line class="wire" x1="1100" y1="525" x2="1120" y2="525"/><text class="pin" x="1094" y="529" text-anchor="end">VMOT</text>
  <line class="wire" x1="1100" y1="558" x2="1120" y2="558"/><text class="pin" x="1094" y="562" text-anchor="end">GND</text>
  <line class="wire" x1="1100" y1="620" x2="1120" y2="620"/><text class="pin" x="1094" y="624" text-anchor="end">2B</text>
  <line class="wire" x1="1100" y1="652" x2="1120" y2="652"/><text class="pin" x="1094" y="656" text-anchor="end">2A</text>
  <line class="wire" x1="1100" y1="690" x2="1120" y2="690"/><text class="pin" x="1094" y="694" text-anchor="end">1A</text>
  <line class="wire" x1="1100" y1="722" x2="1120" y2="722"/><text class="pin" x="1094" y="726" text-anchor="end">1B</text>

  <!-- A4988 power/ground/logic -->
  <use href="#vcc" x="855" y="525"/><text class="net" x="855" y="508" text-anchor="middle">+3V3</text>
  <use href="#gnd" x="855" y="792"/>
  <use href="#gnd" x="1150" y="558"/><line class="wire" x1="1120" y1="558" x2="1150" y2="558"/>
  <!-- RST tied to SLP -->
  <path class="wire" d="M880,652 L862,652 L862,682 L880,682"/><text class="pin" x="846" y="671" text-anchor="end" fill="#555">RST=SLP</text>
  <!-- MS pins open -->
  <text class="pin" x="862" y="720" text-anchor="end" fill="#999">NC</text>
  <text class="pin" x="862" y="746" text-anchor="end" fill="#999">NC</text>
  <text class="pin" x="862" y="772" text-anchor="end" fill="#999">NC</text>
  <text class="note" x="780" y="800" fill="#555">MS1–3 open = full step</text>

  <!-- logic wires U1 -> U2 -->
  <path class="wire" d="M740,548 L790,548 L790,556 L880,556"/><text class="net" x="796" y="551">EN</text>
  <path class="wire" d="M740,470 L815,470 L815,586 L880,586"/><text class="net" x="821" y="580">STEP</text>
  <path class="wire" d="M740,508 L805,508 L805,616 L880,616"/><text class="net" x="811" y="610">DIR</text>

  <!-- C1 across VMOT-GND at the driver -->
  <line class="wire" x1="1120" y1="525" x2="1180" y2="525"/>
  <circle cx="1180" cy="525" r="3" fill="#333"/>
  <use href="#capP" x="1180" y="539"/>
  <use href="#gnd" x="1180" y="560"/>
  <text class="ref" x="1196" y="543">C1 100µF</text>
  <!-- VMOT net label -->
  <line class="wire" x1="1180" y1="525" x2="1230" y2="525"/>
  <rect x="1230" y="515" width="56" height="20" rx="4" fill="#fff" stroke="#7f1d1d"/>
  <text x="1258" y="529" text-anchor="middle" font-family="Menlo,monospace" font-size="12" fill="#7f1d1d">VMOT</text>

  <!-- ============================= M1 stepper ============================= -->
  <circle cx="1300" cy="670" r="55" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="1300" y="668" text-anchor="middle" font-size="22" font-weight="bold">M</text>
  <text x="1300" y="690" text-anchor="middle" font-size="11" fill="#555">stepper</text>
  <text class="ref" x="1300" y="598" text-anchor="middle">M1  bipolar</text>
  <line class="wire" x1="1120" y1="620" x2="1277" y2="620"/>
  <line class="wire" x1="1120" y1="652" x2="1249" y2="652"/>
  <line class="wire" x1="1120" y1="690" x2="1249" y2="690"/>
  <line class="wire" x1="1120" y1="722" x2="1281" y2="722"/>
  <text class="net" x="1135" y="614">2B</text><text class="net" x="1135" y="646">2A</text>
  <text class="net" x="1135" y="684">1A</text><text class="net" x="1135" y="716">1B</text>
  <text class="note" x="1150" y="640" fill="#ea580c">Coil B</text>
  <text class="note" x="1150" y="708" fill="#ea580c">Coil A</text>

  <!-- ============================= J1 motor supply ============================= -->
  <rect class="ic" x="1120" y="840" width="150" height="80" rx="6"/>
  <text class="icttl" x="1195" y="832" text-anchor="middle">J1  Motor PSU</text>
  <text class="pin" x="1195" y="905" text-anchor="middle" fill="#777">8–35 V (e.g. 12 V)</text>
  <line class="wire" x1="1120" y1="864" x2="1090" y2="864"/><text class="pin" x="1126" y="868">+V</text>
  <line class="wire" x1="1120" y1="892" x2="1090" y2="892"/><text class="pin" x="1126" y="896">−</text>
  <rect x="1034" y="854" width="56" height="20" rx="4" fill="#fff" stroke="#7f1d1d"/>
  <text x="1062" y="868" text-anchor="middle" font-family="Menlo,monospace" font-size="12" fill="#7f1d1d">VMOT</text>
  <use href="#gnd" x="1090" y="892"/>

  <!-- ============================= NOTES ============================= -->
  <rect x="40" y="700" width="700" height="320" rx="8" fill="#fffdf5" stroke="#e0c97f"/>
  <text x="58" y="726" font-size="15" font-weight="bold" fill="#8a6d1b">Notes</text>
  <text class="note" x="58" y="752">1.  Single ground net — every ⏚ symbol (U1, U2 logic + motor, OLED, buttons, buzzer, C1, J1−) is the same node.</text>
  <text class="note" x="58" y="776">2.  +3V3 is sourced by U1's 3V3 pad and feeds U3 VCC and U2 VDD. U1 is powered from USB-C (+5V).</text>
  <text class="note" x="58" y="800">3.  Nets tagged VMOT (U2 VMOT, C1, J1 +V) are one node — the motor supply, separate from logic 3V3.</text>
  <text class="note" x="58" y="824">4.  C1 (100µF electrolytic) sits right at U2 across VMOT–GND to absorb coil-switching transients.</text>
  <text class="note" x="58" y="848">5.  A4988 RST is jumpered to SLP so the driver stays awake; MS1–3 left open = full-step.</text>
  <text class="note" x="58" y="872" fill="#8a6d1b">6.  ⚠ EN: the A4988 chip enables on LOW, but firmware drives EN HIGH to run / LOW to idle —</text>
  <text class="note" x="74" y="890" fill="#8a6d1b">verify the physical EN net matches your build (or that EN is jumpered to GND and GPIO12 unused).</text>
  <text class="note" x="58" y="914" fill="#8a6d1b">7.  ⚠ Firmware sees SW3 (MODE) idling LOW while the others idle HIGH — confirm that switch's wiring.</text>
  <text class="note" x="58" y="942">8.  Buttons use the ESP32's internal pull-ups (INPUT_PULLUP); no external resistors required.</text>
  <text class="note" x="58" y="970" fill="#555">Pin map taken from ESP32_Source/src/main.cpp and the project build doc.</text>

  <!-- title block -->
  <rect x="760" y="958" width="340" height="62" rx="6" fill="#fafafa" stroke="#999"/>
  <line x1="760" y1="982" x2="1100" y2="982" stroke="#ccc"/>
  <text x="772" y="976" font-size="13" font-weight="bold">TrayAgitator — main control board</text>
  <text x="772" y="1002" class="pin">ESP32-S3 Zero · Rev A · 2026-05-26</text>
</svg>
